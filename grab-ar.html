<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grab AR</title>
<style>
  :root {
    --bg: #0b0d10;
    --ink: #e8ecef;
    --dim: #8a939c;
    --accent: #ffd166;
    --line: rgba(255,255,255,0.14);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--ink);
    font-family: "Avenir Next", "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
    overflow: hidden; }

  /* 内カメラ時のみ鏡像表示。背面カメラ時は .mirrored を外す */
  #video {
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: cover;
  }
  #video.mirrored { transform: scaleX(-1); }
  #three { position: fixed; inset: 0; width: 100%; height: 100%; }

  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 5;
    display: flex; justify-content: space-between; align-items: center;
    padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 10px;
    background: linear-gradient(rgba(11,13,16,.85), transparent);
    pointer-events: none;
  }
  header h1 { font-size: 13px; font-weight: 600; letter-spacing: .22em; }
  header h1 span { color: var(--accent); }
  #status { font-size: 11px; color: var(--dim); letter-spacing: .08em; text-align: right; }

  footer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 5;
    display: flex; justify-content: center; gap: 10px;
    padding: 14px 18px calc(env(safe-area-inset-bottom, 0px) + 16px);
    background: linear-gradient(transparent, rgba(11,13,16,.9));
  }
  footer button {
    padding: 11px 22px; border-radius: 999px;
    border: 1px solid var(--line); background: rgba(255,255,255,.05);
    color: var(--ink); font-size: 13px; font-weight: 600; letter-spacing: .1em;
    cursor: pointer;
  }
  footer button:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  #gate {
    position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 22px; text-align: center;
    background: var(--bg); padding: 24px;
  }
  #gate h2 { font-size: 20px; font-weight: 700; letter-spacing: .14em; }
  #gate p { font-size: 13px; color: var(--dim); line-height: 1.9; max-width: 330px; }
  #gate button {
    padding: 15px 46px; border-radius: 999px; border: none;
    background: var(--accent); color: #1b1405; font-size: 15px; font-weight: 700;
    letter-spacing: .14em; cursor: pointer;
  }
  #gate small { color: var(--dim); font-size: 11px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="gate">
  <h2>GRAB <span style="color:var(--accent)">AR</span></h2>
  <p>親指と人差し指で「つまむ」と 3D オブジェクトをつかめます。
     つかんだまま動かして、指を開くと投げられます。
     片手でつかんだまま、もう片方の手でもピンチして
     両手の間隔を広げる / 狭めるとサイズ変更できます。</p>
  <button id="startBtn">カメラを起動</button>
  <small>解析は端末内で完結し、映像は送信されません</small>
</div>

<video id="video" playsinline muted></video>
<canvas id="three"></canvas>

<header class="hidden" id="hud">
  <h1>GRAB <span>AR</span></h1>
  <div id="status">loading…</div>
</header>

<footer class="hidden" id="ft">
  <button id="camBtn">🔄 カメラ切替</button>
  <button id="resetBtn">配置リセット</button>
  <button id="addBtn">＋ 図形</button>
  <button id="glbBtn">📦 モデル読込</button>
  <input type="file" id="glbInput" accept=".glb,.gltf" multiple style="display:none">
</footer>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { FilesetResolver, HandLandmarker }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video   = document.getElementById("video");
const status_ = document.getElementById("status");

/* ---------- Three.js セットアップ ---------- */
const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("three"), alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 50);
camera.position.set(0, 0, 0);

scene.add(new THREE.HemisphereLight(0xffffff, 0x334455, 1.1));
const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(1.5, 2.5, 2);
scene.add(sun);

const PLANE_Z = -2.4;            // オブジェクトの基準奥行き
const objects = [];              // { mesh, vel, grabbedBy }
const GEOMS = [
  () => new THREE.TorusKnotGeometry(0.16, 0.055, 110, 14),
  () => new THREE.IcosahedronGeometry(0.20, 0),
  () => new THREE.BoxGeometry(0.28, 0.28, 0.28),
  () => new THREE.TorusGeometry(0.18, 0.07, 16, 40),
  () => new THREE.OctahedronGeometry(0.21, 0),
];
const COLORS = [0xffd166, 0x4ecdc4, 0xef6f6c, 0x9b8cff, 0x6fd66f];

function spawn(i, pos) {
  const mesh = new THREE.Mesh(
    GEOMS[i % GEOMS.length](),
    new THREE.MeshStandardMaterial({
      color: COLORS[i % COLORS.length], metalness: 0.35, roughness: 0.35 }));
  mesh.position.copy(pos ?? new THREE.Vector3((i % 3 - 1) * 0.85, (i % 2 ? 0.45 : -0.35), PLANE_Z));
  mesh.rotation.set(Math.random() * 3, Math.random() * 3, 0);
  scene.add(mesh);
  objects.push({ mesh, vel: new THREE.Vector3(), spin: new THREE.Vector3(
    (Math.random() - .5) * .02, (Math.random() - .5) * .02, 0), grabbedBy: -1 });
}
function resetScene() {
  // プリミティブは削除、読み込んだGLBモデルは位置だけ戻す
  for (let i = objects.length - 1; i >= 0; i--) {
    const o = objects[i];
    if (o.materials) {              // GLB モデル
      o.grabbedBy = -1;
      o.vel.set(0, 0, 0);
      o.mesh.position.set((Math.random() - .5) * 1.2, (Math.random() - .5) * 0.8, PLANE_Z);
      setEmissive(o, 0x000000);
    } else {
      scene.remove(o.mesh);
      objects.splice(i, 1);
    }
  }
  for (let i = 0; i < 3; i++) spawn(i);
}
resetScene();

document.getElementById("resetBtn").addEventListener("click", resetScene);
document.getElementById("addBtn").addEventListener("click", () => {
  if (objects.length < 10) spawn(objects.length,
    new THREE.Vector3((Math.random() - .5) * 1.4, (Math.random() - .5) * 0.9, PLANE_Z));
});

/* ---------- Blender(GLB/GLTF)モデル読み込み ----------
   ★ リポジトリに .glb を置いて自動読み込みしたい場合は
     ここにファイル名を追加（このHTMLと同じ階層に置く）        */
const AUTO_LOAD_MODELS = [
  // "models/robot.glb",
  // "models/chair.glb",
];

const gltfLoader = new GLTFLoader();
const TARGET_SIZE = 0.45;        // 読み込み後の最大辺の長さ（ワールド単位）

function loadGLB(url, label = "model") {
  status_.textContent = `読み込み中: ${label}…`;
  gltfLoader.load(url, (gltf) => {
    const model = gltf.scene;

    // バウンディングボックスで中心合わせ & サイズ正規化
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z) || 1;
    const s = TARGET_SIZE / maxDim;

    const group = new THREE.Group();
    model.position.sub(center);   // 原点に中心を移動
    group.add(model);
    group.scale.setScalar(s);
    group.position.set((Math.random() - .5) * 1.2, (Math.random() - .5) * 0.8, PLANE_Z);

    // emissive 操作用にマテリアル収集（GLBは複数マテリアルを持つことがある）
    const mats = [];
    model.traverse((c) => {
      if (c.isMesh && c.material) {
        const list = Array.isArray(c.material) ? c.material : [c.material];
        for (const m of list) if ("emissive" in m) mats.push(m);
      }
    });

    scene.add(group);
    objects.push({ mesh: group, vel: new THREE.Vector3(),
      spin: new THREE.Vector3(0, (Math.random() - .5) * .015, 0),
      grabbedBy: -1, materials: mats });
    status_.textContent = `${label} を追加しました`;
  },
  undefined,
  (err) => {
    status_.textContent = `読み込み失敗: ${label}`;
    console.error(err);
  });
}

// ファイル選択（スマホ/PC共通）
const glbInput = document.getElementById("glbInput");
document.getElementById("glbBtn").addEventListener("click", () => glbInput.click());
glbInput.addEventListener("change", () => {
  for (const f of glbInput.files) loadGLB(URL.createObjectURL(f), f.name);
  glbInput.value = "";
});

// PC ならドラッグ&ドロップでも追加可能
addEventListener("dragover", (e) => e.preventDefault());
addEventListener("drop", (e) => {
  e.preventDefault();
  for (const f of e.dataTransfer.files)
    if (/\.(glb|gltf)$/i.test(f.name)) loadGLB(URL.createObjectURL(f), f.name);
});

// リポジトリ内モデルの自動読み込み
for (const path of AUTO_LOAD_MODELS) loadGLB(path, path.split("/").pop());

/* emissive ハイライト（プリミティブ/GLB 両対応） */
function setEmissive(o, hex) {
  const mats = o.materials ?? ("emissive" in o.mesh.material ? [o.mesh.material] : []);
  for (const m of mats) m.emissive = new THREE.Color(hex);
}

/* つかみ位置を示すカーソル（手ごとに1個） */
const cursors = [];
for (let i = 0; i < 2; i++) {
  const c = new THREE.Mesh(
    new THREE.RingGeometry(0.045, 0.06, 32),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85,
      side: THREE.DoubleSide, depthTest: false }));
  c.visible = false;
  scene.add(c);
  cursors.push(c);
}

function resize() {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
}
addEventListener("resize", resize);
resize();

/* ---------- MediaPipe ---------- */
let handLm = null, lastVideoTime = -1;
let facingMode = "user";          // "user"=内カメラ / "environment"=背面
let mirror = true;                // 内カメラ時のみ鏡像
let currentStream = null;
let started = false;

async function startCamera(mode) {
  // 既存ストリームを停止してから切り替え
  if (currentStream) currentStream.getTracks().forEach(t => t.stop());
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: mode }, width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false });
  currentStream = stream;
  facingMode = mode;
  mirror = (mode === "user");
  video.classList.toggle("mirrored", mirror);
  video.srcObject = stream;
  await video.play();
}

document.getElementById("startBtn").addEventListener("click", async () => {
  const btn = document.getElementById("startBtn");
  btn.disabled = true; btn.textContent = "起動中…";
  try {
    await startCamera(facingMode);

    document.getElementById("gate").classList.add("hidden");
    document.getElementById("hud").classList.remove("hidden");
    document.getElementById("ft").classList.remove("hidden");

    status_.textContent = "モデル読み込み中…";
    const fileset = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    handLm = await HandLandmarker.createFromOptions(fileset, {
      baseOptions: { modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU" },
      runningMode: "VIDEO", numHands: 2 });

    started = true;
    status_.textContent = "手をかざしてください";
    requestAnimationFrame(loop);
  } catch (e) {
    btn.disabled = false; btn.textContent = "カメラを起動";
    alert("カメラを起動できませんでした。\nHTTPS でアクセスしているか、カメラ許可を確認してください。\n" + e.message);
  }
});

// カメラ切り替え（内 ⇄ 背面）
document.getElementById("camBtn").addEventListener("click", async () => {
  if (!started) return;
  const next = facingMode === "user" ? "environment" : "user";
  try {
    await startCamera(next);
    status_.textContent = next === "user" ? "内カメラ" : "背面カメラ";
  } catch (e) {
    // 背面カメラが無い端末などはフォールバック
    alert("このカメラに切り替えできませんでした（端末に存在しない可能性があります）。\n" + e.message);
    await startCamera(facingMode);
  }
});

/* ---------- 座標変換 ----------
   MediaPipe 正規化座標(映像基準) → 画面ピクセル(object-fit:cover 補正)
   → NDC → PLANE_Z 平面上のワールド座標                     */
const ray = new THREE.Raycaster();
const ndc = new THREE.Vector2();

function lmToWorld(p, depthOffset = 0) {
  const vw = video.videoWidth, vh = video.videoHeight;
  const cw = innerWidth, ch = innerHeight;
  const scale = Math.max(cw / vw, ch / vh);
  const dx = (cw - vw * scale) / 2, dy = (ch - vh * scale) / 2;
  // 内カメラは鏡像表示なので x を反転。背面カメラはそのまま
  const sx = (mirror ? (1 - p.x) : p.x) * vw * scale + dx;
  const sy = p.y * vh * scale + dy;
  ndc.set((sx / cw) * 2 - 1, -(sy / ch) * 2 + 1);
  ray.setFromCamera(ndc, camera);
  const z = PLANE_Z + depthOffset;
  const t = (z - camera.position.z) / ray.ray.direction.z;
  return camera.position.clone().add(ray.ray.direction.clone().multiplyScalar(t));
}

/* ---------- 手の状態 ---------- */
const hands = [
  { pinched: false, pos: new THREE.Vector3(), prev: new THREE.Vector3(), baseScale: 0, grabDepth: 0 },
  { pinched: false, pos: new THREE.Vector3(), prev: new THREE.Vector3(), baseScale: 0, grabDepth: 0 },
];

const PINCH_ON = 0.050, PINCH_OFF = 0.085;
const GRAB_RADIUS = 0.42;

/* 両手ピンチによるサイズ変更の状態 */
let scaleState = null;            // { obj, baseDist, baseScale }
const SCALE_MIN = 0.25, SCALE_MAX = 4.0;   // 元サイズに対する倍率の範囲

/* ---------- メインループ ---------- */
function loop() {
  if (video.readyState >= 2 && video.currentTime !== lastVideoTime && handLm) {
    lastVideoTime = video.currentTime;
    const result = handLm.detectForVideo(video, performance.now());
    updateHands(result);
  }
  physics();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

function updateHands(result) {
  const list = result.landmarks ?? [];
  let grabbing = 0;

  for (let h = 0; h < 2; h++) {
    const hand = hands[h];
    const cursor = cursors[h];

    if (h >= list.length) {                       // 手が見えない → 解放
      if (hand.pinched) release(h);
      hand.pinched = false;
      cursor.visible = false;
      continue;
    }
    const lm = list[h];

    // 手の見かけサイズ（手首0→中指付け根9）で奥行きを推定
    const handSize = Math.hypot(lm[0].x - lm[9].x, lm[0].y - lm[9].y);

    // ピンチ判定（親指4 × 人差し指8）ヒステリシス付き
    const d = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
    const mid = { x: (lm[4].x + lm[8].x) / 2, y: (lm[4].y + lm[8].y) / 2 };

    if (!hand.pinched && d < PINCH_ON) {          // つかみ開始
      hand.pinched = true;
      hand.baseScale = handSize;
      const grabbed = tryGrab(h, lmToWorld(mid));
      // 何もつかめず、もう片方の手がオブジェクトを保持中 → サイズ変更モード
      if (!grabbed) {
        const otherHeld = objects.find(o => o.grabbedBy === 1 - h);
        if (otherHeld && hands[1 - h].pinched) {
          scaleState = { obj: otherHeld, baseDist: null,
                         baseScale: otherHeld.mesh.scale.x,
                         origScale: otherHeld.origScale ?? otherHeld.mesh.scale.x };
          otherHeld.origScale = scaleState.origScale;
        }
      }
    } else if (hand.pinched && d > PINCH_OFF) {   // 解放 → 投げる
      hand.pinched = false;
      release(h);
    }

    // 奥行きオフセット：手を近づける(大きく見える)ほど手前へ
    const depth = hand.pinched
      ? THREE.MathUtils.clamp((handSize / hand.baseScale - 1) * 2.2, -1.0, 1.4)
      : 0;

    hand.prev.copy(hand.pos);
    hand.pos.copy(lmToWorld(mid, depth));

    // カーソル表示
    cursor.visible = true;
    cursor.position.copy(hand.pos);
    cursor.material.color.set(hand.pinched ? 0xffd166 : 0xffffff);
    cursor.scale.setScalar(hand.pinched ? 0.7 : 1);

    // つかんでいるオブジェクトを追従させる
    const held = objects.find(o => o.grabbedBy === h);
    if (held) {
      grabbing++;
      held.mesh.position.lerp(hand.pos, 0.55);
      held.vel.copy(hand.pos).sub(hand.prev).multiplyScalar(0.6);
      held.mesh.rotation.y += 0.03;
    }
  }

  /* ---- 両手ピンチでサイズ変更：手の間隔の比率でスケール ---- */
  let scaleInfo = "";
  if (scaleState) {
    if (hands[0].pinched && hands[1].pinched &&
        scaleState.obj.grabbedBy !== -1) {
      const dist = hands[0].pos.distanceTo(hands[1].pos);
      if (scaleState.baseDist === null) scaleState.baseDist = Math.max(dist, 0.05);
      const factor = THREE.MathUtils.clamp(
        (scaleState.baseScale * dist / scaleState.baseDist) / scaleState.origScale,
        SCALE_MIN, SCALE_MAX);
      const s = scaleState.origScale * factor;
      scaleState.obj.mesh.scale.setScalar(
        THREE.MathUtils.lerp(scaleState.obj.mesh.scale.x, s, 0.4));
      scaleInfo = `SCALING ×${factor.toFixed(2)} — 手を広げる/狭める`;
    } else {
      scaleState = null;          // どちらかが解放されたら終了
    }
  }

  status_.textContent =
    list.length === 0 ? "手をかざしてください"
    : scaleInfo       ? scaleInfo
    : grabbing > 0    ? "GRABBING — もう片方の手でピンチするとサイズ変更"
    :                   "ピンチでつかめます";
}

function tryGrab(h, point) {
  let best = null, bestDist = GRAB_RADIUS;
  for (const o of objects) {
    if (o.grabbedBy !== -1) continue;
    const dist = o.mesh.position.distanceTo(point);
    if (dist < bestDist) { best = o; bestDist = dist; }
  }
  if (best) {
    best.grabbedBy = h;
    setEmissive(best, 0x332200);
    return true;
  }
  return false;
}

function release(h) {
  const o = objects.find(o => o.grabbedBy === h);
  if (!o) return;
  o.grabbedBy = -1;
  setEmissive(o, 0x000000);
  o.vel.multiplyScalar(6);                        // 直前の手の速度で投げる
}

/* ---------- ゆるい物理：減衰 + 画面内バウンド ---------- */
function physics() {
  const bound = { x: 1.5, y: 1.0, zNear: PLANE_Z + 1.4, zFar: PLANE_Z - 1.0 };
  for (const o of objects) {
    if (o.grabbedBy !== -1) continue;
    o.mesh.position.add(o.vel);
    o.vel.multiplyScalar(0.965);
    o.mesh.rotation.x += o.spin.x;
    o.mesh.rotation.y += o.spin.y;
    const p = o.mesh.position;
    if (Math.abs(p.x) > bound.x) { p.x = Math.sign(p.x) * bound.x; o.vel.x *= -0.8; }
    if (Math.abs(p.y) > bound.y) { p.y = Math.sign(p.y) * bound.y; o.vel.y *= -0.8; }
    if (p.z > bound.zNear) { p.z = bound.zNear; o.vel.z *= -0.8; }
    if (p.z < bound.zFar)  { p.z = bound.zFar;  o.vel.z *= -0.8; }
  }
}
</script>
</body>
</html>
